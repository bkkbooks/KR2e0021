body:
  text: 革除逸史卷二明朱睦㮮撰洪武三十有四年即建文三年春正月辛酉作凝命神寶成是日厯城侯庸遣使獻東昌之捷丁丑帝告捷于郊廟二月乙巳文皇復帥衆出北平己酉次保定庸合諸軍二十萬三月己卯次夾河庚辰靖難兵亦次夾河辛巳兩軍方成列文皇以三騎覘庸軍而還庸見三騎即遣數十騎追之文皇勒馬控弦以待追騎近引弓射殪一人已復追又殪一人如是連殪數人追騎不敢逼文皇乃以萬五千人薄庸軍庸軍擁盾層疊自蔽靖難兵以木䂎攻之自辰至未勝負未決兩軍退稍憩忽東北風起塵埃蔽空庸軍昏暗不辨咫尺燕將乘風縱火趣兵擊之庸軍大敗都指揮楚智莊德俱死之燕將談淵亦被衆軍所殱庸是夜走還德州癸未安陸侯傑都督平安自真定帥衆次單家橋來援庸軍甲申靖難兵掩至傑等不及陳而敗死者無算閏三月罷兵部尚書齊泰太常卿黃子澄以謝燕以尚書茹瑺掌兵部事泰子澄雖解秩然實用事乙未安陸侯傑軍滹沱河北去靖難兵七十里文皇諜知亦帥衆渡河傑聞靖難兵渡河復移軍藁城己亥傑列營城西南靖難兵分步卒擊其三面傑發火器大弩射文皇不中矢集燕旗如蝟毛平安結樓陳間髙數丈登望薄暮文皇舍諸軍直趨樓下安見文皇馳至急下樓而走傑軍亦敗都指揮鄧戩陳鵬首被執傑等還真定己酉靖難兵次順德辛亥次廣平是日帝貽書文皇謫斥兵部尚書泰太常卿子澄欲罷兵息民癸丑文皇復上書曰比聞姧臣泰子澄皆已竄逐臣家長少皆欣喜有更生之望即以此意遍告將士將士曰誠所願見但慮非誠心而姧臣為退避之計以緩我耳如出誠心則盛庸吳傑之衆當悉召還而猶聚境上侵迫不已則是姧臣之身雖退而其計實行也臣思其言恐亦或然夫聖人感人至誠而已至誠可孚豚魚而况人乎陛下推誠待下誰不悅從若徒示以去姧臣之名而實用其計非獨撤陛下之藩籬將遂傾陛下之堂室莽操之事前鑒甚明此不特智者而後知也書至帝召孝孺視書對曰今諸軍大集燕兵久羈大名暑雨為沴不戰自罷急令遼東諸軍攻永平真定諸軍攻北平彼顧巢穴歸援我以大軍躡其後必成擒矣我固緩之而奏適至且與報書往返踰月彼心懈而衆離我謀定而勢合帝曰善立命孝孺草詔罷兵命大理少卿薛嵓持報燕又刻榜諭數千授嵓密布軍中令其解散諸將士見榜諭怒甚欲殺嵓文皇曰不可此天子命使也留置左右慰諭數日遣中使護嵓出境語之曰歸為老臣謝天子天子于臣至親臣父天子大父天子父臣同産兄也天子素愛臣一旦為權姧讒構以至于此臣亦不得已為自救之計耳幸蒙罷兵之詔臣不勝欣戴但姧臣尚在大軍未還臣將士心存狐疑未肯遽散望陛下誅此姧臣數人散歸天下兵馬臣父子一童一騎歸罪闕下惟陛下命之夏四月嵓歸入見備述文皇之意帝語孝孺曰誠如嵓言曲在朝廷齊黃誤我矣孝孺曰嵓受燕賄故為之説遂罷議五月癸卯厯城侯庸安陸侯傑出兵扼燕餉道文皇令指揮武勝上書曰頃蒙遣大理少卿薛嵓下詔軍中諭以偃兵息民雖臣將士不能無疑臣之父子蓋已仰戴陛下之仁矣嵓歸未十日吳傑等頻疊發兵絶臣餉道殺臣將校將校守臣約束不敢赴鬭而彼欲求釁略不見舍與比下詔旨背馳誠有以中將士之疑孤臣父子之所仰戴矣臣之忠誠計嵓歸已達惟陛下擴明奮斷以安天下臣亦有保全之望矣帝覽書曰燕王本皇考孝康皇帝母弟於朕為叔父奈何必用兵為也召諭意孝孺孝孺對曰陛下欲罷兵兵一罷即難復聚彼或長驅犯闕何以禦之今軍聲大振不日有捷書來聞願陛下無惑甘言遂縳勝下獄是日刑部左侍郎王良以勘燕事不合旨出為浙江肅政按察使六月辛酉文皇聞勝下獄知前詔旨非實乃遣李逺至濟寧又至沛縣焚餉舟萬艘漕卒散走京師震驚是時觀海衛指揮張夀與客私語國事危急皆由北伐之誤執政者聞而惡之言于帝夀坐妖言誅自是無敢言國事者秋七月命太僕少卿祝孟獻使朝鮮市馬己丑靖難兵襲彰德不克癸巳文皇遣都指揮張禮破尾尖寨丙申林縣守將以城降丁酉平安邀擊燕將劉江于平村戊戌帝使錦衣衛千户張安貽燕世子書先是孝孺聞髙煦髙燧不睦於世子屢讒于父內使黃儼素姧險世子惡之儼曲事髙燧燧與世子守北平髙煦從文皇軍中時時傾世子孝孺言于帝曰兵家貴間燕父子兄弟可間也帝曰奈何間之孝孺告其故帝曰善立命孝孺草書貽世子令歸朝且許王燕地世子得書不啓函并安致文皇所燧及儼先已馳使告文皇世子且反文皇疑問髙煦煦曰世子夙與太孫雅善語未竟世子書至文皇覽書乃嘆曰幾殺吾子縱安還壬寅大同守將都指揮房昭引兵由紫荆關趨西水寨八月雲南老撾及八百刁板面遣使入貢丁巳靖難兵渡滹沱河丙子文皇聞安陸侯傑遣將韋諒以兵萬餘轉餉給房昭軍命都指揮朱榮帥兵三萬邀擊破之九月壬辰靖難兵次定州欲攻西水寨甲辰都指揮花英鄭琦帥步騎三萬援西水寨冬十月丙辰英等列營齊眉山下是時圍寨已久寨軍多南人天寒思歸會月夜文皇命四面皆吳歌南軍聞之殞泣有潛下寨降者詰朝文皇帥兵出陳後合戰房昭韋諒不能支退走英琦及都指揮王恭指揮詹忠皆被執西水寨遂破己卯靖難兵還北平是月翰林修撰王艮卒十有一月都督楊文帥遼東兵圍永平不克庚戌移兵攻昌黎遇燕將劉江戰敗指揮王雄等七十一人皆被執辛亥京師置神武中衛盱眙置鎮淮衛又置沛豐衛軍民指揮使司以備燕十有二月以駙馬都尉梅殷守淮安丙寅靖難兵出北平壬午次蠡縣是月太祖髙皇帝實録成皇少子文圭生以龔泰為禮科都給事中陳洽為吏部郎中羅恢為國子學録程通為遼府長史改程本立為江西肅政按察司副使鐡嶺衛有警洪武三十有五年即建文四年春正月召周王舍之京師甲申燕將李逺次藁城厯城侯庸亦遣葛進以馬步兵萬餘乘氷渡滹沱河方半渡會逺至進見逺兵少斂退繫馬林間以步卒逆戰逺佯敗分兵潛解所繫馬前軍奮擊進退失馬遂大敗斬首四千餘級進僅以身免戊戌靖難兵破東阿遂破東平指揮詹璟被執吏目鄭華戰死庚子靖難兵拔汶上守將薛鵬被執辛丑兵將入兗文皇下令曰曲阜孔子之鄉鄒縣孟子之鄉師入境有損一草一木者殺無赦庚戌靖難兵攻沛縣守將指揮王顯以城降知縣顔伯瑋及主簿唐子清典史黃謙俱死之二月甲寅靖難兵拔濟陽執教諭王省縱之省還升明倫堂集諸生大哭諸生亦大哭省觸堂柱而死甲戌文皇次徐州乙亥遣使祭徐王墓禁其樵採三月甲申靖難兵由徐州遂趨宿州辛卯次蒙城壬辰次渦河甲午平安等逆戰敗績獲胡騎指揮火耳灰及哈三帖木兒平安變服遁走夏四月甲寅安徙淝河乙卯與燕將王真陳文等復戰真後隊不繼安麾兵圍數匝真度不免乃自頸文亦被殺是役也文皇督戰急幾為安槊所及安馬蹶文皇乃脫裨將丁良宋彬被執燕軍大懼丙辰安營于小河南靖難兵營于小河北甲戌魏國公輝祖移軍援安與燕軍戰于齊眉山下輝祖斬燕將李彬等十餘人燕兵退走乙亥燕諸將欲還小河東俟隙而動文皇不聽丙子何福引兵會安燕軍益懼會京師訛聞燕軍北歸召輝祖入衛丁丑安軍次靈璧靖難兵遮其餉道福等來援己卯戰敗指揮宋瑄死之於是安及參將馬浦徐真都指揮孫成禮部侍郎陳性善大理寺丞彭與民欽天監副劉伯完指揮王貴皆被執性善與民伯完文皇皆縱之還性善愧憤躍馬入河而死黃子澄聞諸軍屢戰屢踣乃撫膺慟曰大事去矣吾輩萬死不足以贖誤國之罪五月己丑靖難兵攻泗州守將周景初以城降是日文皇謁祖陵已諸父老入見賜以牛酒慰勞辛卯厯城侯庸帥步兵戰艦次淮南靖難兵次淮北燕將朱能丘福潛濟出庸後庸懼不戰而退靖難兵遂乘勝渡淮拔盱眙壬辰兵次揚州江都知縣張本修治城守之具其母曰厯數有歸守之何益本悟遂與指揮王禮謀執監察御史王彬守將指揮崇剛以城降彬剛不屈皆死之癸巳衡府紀善周是修靖江府直史蕭用道上書論國大計且指斥誤國之罪執政者怒大詬二子二子不動子寧曰國事至此尚不容言邪詬者乃止壬寅帝下罪己之詔遣禮部侍中黃觀國子祭酒張顯宗翰林修撰王叔英與子寧分道徵兵于上遊諸郡明日令慶成郡主如燕文皇見郡主慟哭郡主亦泣下沾襟少頃郡主以割地請文皇曰吾所受先帝封土且不保割地何用吾此來欲得姧臣耳志在清朝廷安社稷不在土地但得罪人即謁孝陵朝天子求釋諸王之囚歸守舊藩耳此議蓋姧臣欲緩我以待援兵吾豈為所欺哉郡主默然遂辭歸具陳其語帝出以諭孝孺孝孺失色帝曰奈何孝孺曰長江天塹北岸舟楫俱已焚燬且遏截甚嚴彼豈能飛渡邪帝心稍慰六月癸丑朔靖難兵次浦子口魏國公輝祖及開國公常鼎帥師擊敗之文皇議欲暫還是夜都督僉事陳瑄以舟師迎而燕將吳庸等亦具舟集瓜步以待甲寅文皇將渡江祝曰余為姧臣所迫不得已起兵禦禍誓清君側以安宗社余有弗厭于神者不得渡此江翌日乙卯微風輕揚水波不興文皇既渡大軍相顧錯愕厯城侯庸乃徙營髙資港帥兵逆戰文皇命髙煦為前鋒鼓譟先登文皇以騎兵督其後庸軍敗績失亡無算庸單騎退走戊午鎮江守將童俊以城降庚申文皇次于龍潭帝遣李景隆茹瑺王佐如龍潭再議割地文皇曰吾此來只欲得姧臣耳姧臣得吾即解甲免胄謝罪闕下景隆等懼不敢對壬戌景隆等歸告癸亥帝復令景隆如龍潭申前議景隆有難色遂命諸王偕行文皇見諸王愴然泣下相勞苦諸王具述割地之意文皇曰割地何為不得姧臣吾必不已諸王反命帝會羣臣慟哭或勸帝幸浙江或勸幸湖湘孝孺請堅守京城以待四方援兵議未決齊泰奔廣德黃子澄奔蘇州帝聞之罵曰事起自汝輩乃今棄我去邪明日靖難兵進薄都城都督徐增夀欲出迎大理丞鄒瑾御史魏冕知之帥同官十八人即殿前毆之幾死是日會輟朝二人復大呼請聲徹大內帝聞之殺徐增夀詔諸王羣臣分守九門而金川門屬谷王橞及景隆乙丑侵晨靖難兵至橞與景隆開門迎納文皇遂按兵而入市肆不易都人大悅文皇至燕邸廷臣盡迎帝與左右數人徘徊殿廷亦欲出迎復嘆曰何面目相見乎乃退少頃宮中火起帝遜位遂崩實六月十三日也文皇聞帝崩乃慟哭曰吾此來欲效周公輔少主耳何不亮而遽至此乎遂駐營龍江發哀命有司治喪葬事中外募兵皆解散是日諭軍民臣寮曰曩者姧臣潛蓄異志刪刈支屬余祗承祖訓帥兵誅之今幸內難肅清其有罪者齊泰黃子澄等二十五人余不敢赦其無罪者或有乘時以私怨中之非余意違者必治不貸丙寅諸王及羣臣謂文皇乃髙皇帝適子且長四海歸心宜為嗣請即帝位文皇曰吾始逼于難不得已以兵救禍誓除姦慝以安社稷不意少主為姧臣所蔽之固不亮余心自絶于天今纘承洪業當擇有才德者顧余菲薄豈足負荷諸王及羣臣再請不允丁卯燕諸將上表勸進文皇曰吾與爾等初舉義圖免禍難耳敢冀富貴邪戊辰諸王及羣臣詣燕邸復請亦不允己巳文皇謁孝陵歸諸王羣臣備法駕迎于道左軍民耆老以萬計遮文皇馬不得行文皇固拒諸王羣臣曰臣等為宗廟社稷計不敢忽謹奉天子璽符再拜上文皇曰諸王羣臣以為奉宗廟宜莫如余宗廟事重余不足稱今為衆心所戴余辭不獲勉循衆志然宜協心輔余不逮遂詣奉天殿即皇帝位革除建文四年仍稱洪武諭府部凡建文中改易皇考政令悉復舊庚午詔復周齊代岷四王爵土又封有勳為汝南王有烜為順陽王有爝為祥符王有熹為新安王有光為永寧王有煽為汝陽王有爌為鎮平王有炥為宜陽王尚烐為興平王尚烘為永夀王尚炌為安定王濟熿為平陽王濟熇為廣昌王賢烶為樂安王賢焌為長山王賢為平原王辛未升燕山護衛為親軍指揮使司召文學博士方孝孺草詔孝孺不往迫之以衰麻見上怒逮詣詔獄是日紀善周是修留書别楊士竒等具衣冠入應天府學自經于東廡上聞之嘆曰彼食其祿自盡其心耳於是大理丞鄒瑾太常少卿廖升翰林侍講樓璉給事中龔泰監察御史魏冕皆自裁未幾獲兵部尚書鐡鉉禮部尚書陳迪刑部尚書暴昭侍郎侯泰户部侍郎郭任卓敬御史大夫練子寧茅大芳大理少卿胡閏與文學博士孝孺上俱欲用之示其意鉉等執不從遂就刑壬申上以天子禮葬建文君及皇后馬氏翌日詔復懿文皇太子懿敬皇太子妃舊稱罷其廟祀遷主于園陵改封吳王允熥為廣澤王衡王允爁為懷恩王徐王允為敷惠王廢魏國公輝祖為庶人尋被逮卒于獄執齊泰黃子澄召駙馬都尉梅殷及都督楊文陳暉韓觀黃中等還京師所領將士各還原衛勇士悉放歸農丁丑殺齊泰黃子澄皆夷其族時禮部侍郎黃觀禮科給事中黃鉞翰林修撰王叔英監察御史曾鳳韶浙江按察使王良江西按察副使程本立督府斷事髙巍皆使于外聞靖難兵入都城觀鉞皆投水叔英鳳韶本立巍皆雉經良舉火自焚翰林編修程濟按察僉事胡子義寧波知府王璡衛輝知府孫鎮郎中梁田玉中書舍人宋和郭節皆棄官而去其它變易姓名隱迹山谷者不可勝紀秋七月壬午朔類于南郊詔告天下遣使祭告祖陵皇陵歷代帝王陵改諡湘王曰獻妃曰獻妃召吏部尚書張紞户部尚書王鈍諭之曰卿二人久事先朝習知典故今老矣其解職務月給尚書半俸居京師視時政有戾舊制者直以告朕是夜紞自經于部之後堂其妻與二媵二子隸六人相繼投水而死鈍遁不果左授浙江左布政使以歸詔至漳州府學教授陳思賢帥諸生為舊君位哭臨郡人執送京師思賢暨諸生六人皆死之是月以鄭賜為刑部尚書郁新為工部尚書蹇義陳洽為吏部左右侍郎夏原吉古朴為户部左右侍郎宋禮為禮部侍郎黃福為工部侍郎方賓為兵部侍郎黃信陳瑛為副都御史劉翥楊得安俞士吉為僉都御史李至剛為通政使八月詔諭安南暹羅瓜哇琉球日本西洋蘇門答刺占城諸國已未秦王如京師以袁廷玉為太常寺丞癸丑代王及其世子遜煓如京師是時岷王與西平侯晟交惡詔為平之復命王佐副晟協守壬戌晉王如京師丙寅執左都御史景清先是星者奏文曲犯帝座甚急上固疑及見清衣緋而入委蛇不去上呼左右收之得衣袵中所匿利劒因詰責清亦吐實而死己巳以夏原吉為户部尚書金忠為工部侍郎免畿內今年丁夫之役下谷府長史劉璟獄璟誠意伯基之子也北伐時從王朝京師獻十六䇿不用璟病免至是召不起逮赴詔獄辮髮自經死又逮禮部侍郎黃魁太常少卿盧原質左拾遺戴德彛監察御史髙翔晉府長史程通蘇州知府姚善徽州知府陳彥回俱以不屈就市九月甲申大封功臣以都督僉事丘福為淇國公朱能為成國公張武為成陽侯陳圭為泰寧侯孟善為保定侯鄭亨為武安侯火真為同安侯顧成為鎮逺侯王忠為靖安侯徐忠為永康侯張信為隆平侯李逺為安乎侯郭亮為安成侯都指揮使王聰為武城侯房寬為思恩侯唐雲為新昌伯劉才為廣恩伯徐理為武康伯都指揮僉事徐祥為興安伯李濬為襄城伯孫巖為應城伯趙彛為欣城伯陳旭為雲陽伯房勝為富昌伯指揮使張輔為信安伯談忠為新寧伯又以翊戴功封都尉王寧為永春侯尚書茹瑺為忠誠伯都督僉事王佐為順昌伯陳瑄為平江伯曹國公景隆加祿一千石其餘將校升賞有差上猶慮論功有未當者復命福等議擬以聞福等乃言信安伯輔屢立竒勳父又死難都督李彬陳賢張興陳志王友俱有先鋒摧敵之功與伯劉才埒陳亨子懋王真子通俱未授爵宜準談忠例請上從之進封輔為新城侯彬為豐城侯懋為寧陽侯賢為榮昌伯興為安鄉伯志為遂安伯友為靖逺伯通為武毅伯翌日追封都督同知張玉為榮國公諡忠顯陳亨為涇國公諡襄敏徐增夀為陽武侯尋進封定國公諡忠愍都指揮談淵為崇安侯諡壯節百户王真為金鄉侯諡忠壯以蹇義為吏部尚書劉俊為兵部尚書黃福為工部尚書詔諸蕃入貢者互市如故己丑慶王如京師周世子有燉自臨安入朝越三日壬辰頒世子有燉金寶周王言於上曰嚮者不軌之誣非世子自嬰其禍無逮今矣上亦感嘆作純孝歌以賜丁酉蜀王如京師詔大賚臣民車里軍民宣慰使司宣慰使刁暹答遣使入貢戊申命齊王復國青州谷王徙國長沙是日以解縉胡廣為侍講楊榮為修撰楊士竒黃淮為編修金幼孜胡儼為檢討並直文淵閣專典機務冬十月寧王及楚世子孟烷如京師戊午詔重修太祖髙皇帝實録以曹國公景隆為監修侍講解縉為總裁吏部郎中徐旭等為纂修官己未召羅義為户科給事中楊砥為鴻臚卿張璉為通政使姚廣孝為僧録司左善世戊寅置大寧營州興州三衛十有一月作奉先殿成壬辰册妃徐氏為皇后后武寧王達女也進郭資為户部尚書雒僉為禮部尚書各視事如故十有二月陳瑛請追論建文時效死諸臣詔不許革除逸史卷二
