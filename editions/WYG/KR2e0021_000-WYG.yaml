  text: 欽定四庫全書史部五
  hash: sha256:b14f67abc523da03d0f3895f0bd1a4fc487d6483a8f1f723ef9860afcb5d9dd6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0021_WYG_000-1a, image: WYG0410/WYG0410-0529a.png}
body:
  text: 革除逸史雜史類提要臣等謹按革除逸史二卷明朱睦㮮撰睦㮮周藩宗室居於開封授鎮國中尉博學通經著述極富是書以編年體紀建文帝一朝事蹟明史藝文志載有睦㮮遜國志二卷當即此書盖其後所改名也革除間事明人撰述者極多皆據從亡致身諸録所紀往往失實睦㮮自序獨力辨建文帝髠緇遯去及正統間迎入大内之説乃好事者為之故載建文四年六月事祗以宫中火起帝遜位為𫝊疑之詞其識視諸家為卓矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀革除逸史原序夫載籍之興可以勸善可以懲慝可以奬成可以懼敗斯有國之常訓也革除間史臣逺嫌不紀建文之事以致四年政令闕而不𫝊自仁宣以後山林之士稍稍出逸文談往事于是有撰靖難録者有撰革除録者余嘗觀二録其辭或抑或揚俱失太過而革除録失實尤多如謂遜國君假髠緇遯去又謂正統間自滇雲歸入居大内以夀終𦵏之西山不封不樹又撰偽詩三章有流落西南四十秋之語此皆好事者為之也嗚呼一倡羣和至今百餘年疑者半信者半即海鹽玉山東莞皆稱博雅之儒而不能辨諸說之誤可慨也已今上嗣統首詔有司表章遜國諸臣余感其事乃取諸家論述參以所聞為書一編略具四年之事名曰革除逸史愧非茂先之彊記子産之博聞爰因舊聞聊寓筆削雖不足裨補闕遺庶覽者或有稽焉萬厯二年秋七月既望汴上睦㮮撰
