body:
  text: 革除逸史卷一明朱睦㮮撰建文帝諱允炆太祖之孫懿文太子之子也洪武十年十有一月己卯生生六年而其兄雄英卒又十年而懿文卒上年六十有五矣御東角門對羣臣泣翰林學士劉三吾進曰皇孫富於春秋正位儲極四海繫心皇上無過憂上曰善是年為二十有五年九月庚寅立為皇太孫三十有一年五月甲寅上不豫每旦視朝如故閏五月甲申上大漸召兵部尚書齊泰授顧命乙酉崩于西宮遺詔止諸王入臨辛夘皇太孫即位以明年為建文元年大赦天下上皇祖考謚曰髙皇帝廟號太祖皇祖妣曰髙皇后是日𦵏太祖于孝陵丙申追封皇考懿文太子為孝康皇帝廟號興宗皇妣敬妃常氏為孝康皇后尊母呂氏為皇太后妃馬氏為皇后子文奎為太子追封兄雄英為虞懐王封弟允熥為吳王允熞為衡王允為徐王追封江都郡主為長公主宗人府儀賓耿璿為駙馬都尉命齊泰及太常卿黄子澄叅與機務六月以蹇義為吏部右侍郎夏原吉為户部右侍郎董倫為禮部左侍郎兼翰林學士王景彰為禮部右侍郎兼翰林侍講練子寧為副都御史王紳為國子博士戴元禮為太醫院使召漢中府學教授方孝孺為翰林侍講與董倫同備顧問秋七月徙置周王于蒙化王諱橚太祖髙皇帝第五子孝慈髙后産也生而忠敬慈孝惠和太祖髙后甚鍾愛洪武三年封于吳十三年改封周之國開封初太祖大漸時帝為皇太孫御東角門黄子澄侍帝曰諸王各擁重兵位崇勢偪何以制之子澄曰漢平七國而天下寧帝曰誠如此謀吾無憂矣及踐位召子澄謂曰先生憶昔東角門之言乎對曰不敢忘然事貴密子澄退與齊泰謀泰欲伐燕子澄曰不可燕兵最精卒難圖不如先取周周乃母弟去其手足而後燕可圖也兩人議定白于帝乃命曹國公李景隆帥師備邊假道開封圍王宮遂執王及世子至京師坐以不軌備罹窘辱世子不忍父之非辜遂自誣伏由是王得末減乃闔宮遷之雲南蒙化有司防之嚴撙物以給仍留世子於京師又數月命再審鞫世子承伏如初乃責置臨安八月以雲南左布政使張紞為吏部尚書右布政使陳迪為禮部尚書都督僉事何福為征虜大將軍帥師征百夷都督僉事徐凱副之九月長星殞有聲乙酉雲南總兵官西平侯沐春卒冬十月何福進兵金齒討百夷平之召北平總兵都督楊文還京師十有一月以工部侍郎張昺為北平左布政使河南衞指揮僉事謝貴為北平都指揮使伺察燕事沐春謚惠襄無子弟晟嗣西平侯鎮守雲南何福以平夷功進右府都督同知詔求直言舉山林巖穴懐才抱徳之士以浙江左布政使王鈍為户部尚書進士曾鳳韶為監察御史國子學錄張智為司業皇子學訓導鄒緝為助教燕府訓導康汝楫為安岳知縣召征南將軍都督僉事顧成班師罷北平河南山東山西陜西五省及淮安徐州學校貢士十有二月以鄭賜為工部尚書陳彦囘為徽州知府韓宜可為右副都御史謫監察御史解縉為河州衞吏以入臨非㫖是嵗承天門災洪武三十有二年即建文元年春正月庚辰有事于南郊以太祖髙皇帝配禮成帝御奉天殿受羣臣賀明日賜天下髙年米肉帛絮有差更定官制詔修太祖髙皇帝實録以魏國公徐輝祖監修禮部左侍郎兼翰林學士董倫禮部右侍郎兼翰林學士王景彰翰林侍講方孝孺為總裁太常少卿廖昇侍講學士髙巽志為副總裁修撰李貫博士王紳教授胡昭審理副楊士竒知縣葉惠仲訓導羅恢吏目程本立為纂修官本立遷都御史尋坐祀事不敬降秩仍預纂修二月命都督韓觀治兵徳州都督宋成治兵甘肅廢梁國公胡顯為庶人安置臨襄以楚府姻親之故分遣右都御史景昭侍郎夏原吉給事中徐思勉等凡二十四人充採訪使巡行天下三月封孟烱為永安王丁亥帝視太學改侍郎黄觀為禮部侍中左都御史景清副都御史練子寧為御史大夫監察御史戴徳彛為左拾遺都督府經歴胡閏為右補闕時北平按察僉事湯宗希合帝意言按察使陳瑛受燕府金錢有異謀詞連右布政使曹昱副使張璉俱逮詔獄瑛安置廣西昱為民璉銅陵典史帝用齊黄之策􅃯都督宋忠帥邊兵三萬及燕府護衞健卒戍開平都督徐凱戍臨清都尉兼都督僉事耿璿戍山海關又召燕府胡騎指揮關童等還京師調北平永清兩衞官軍戍彰徳順徳夏四月荆州吿變謂湘王栢私造寶鈔殘虐殺人乃遣使讓王王曰吾為髙皇帝子南面而王先帝疾不及視葬不及㑹抱兹沈痛何樂于生又將辱于奴隸乎因慟哭具服赴火而死葬江陵賜謚曰戾未㡬青州等府吿變錮齊王槫于京師幽代王桂于大同置岷王楩于漳州並廢為庶人京師地震日赤無光監察御史尹昌隆上言隂盛陽微姧臣專擅之致執政者惡之貶昌隆為福寧知縣當是時文皇於諸王中最長兵力最强朝廷深疑而長史葛誠又時時吿密文皇知之因託疾不出久之稱病篤張昺謝貴入問文皇盛夏猶重裘擁火昺貴出嘆息教授俞逢臣附耳曰王無恙不得帝心故耳已而三都督謀燕益急五月太祖小祥時燕世子及弟髙煦髙燧以㑹葬尚留京師文皇疾奏乞三子歸視齊泰因之欲請並收黄子澄曰不可事覺彼先為備不若且還令勿疑也乃悉遣歸六月贈待制王禕為翰林學士謚文節以秦府長史茅大芳為御史大夫右補闕胡閏為大理卿仁夀縣主簿樓璉為翰林侍讀漢陽知縣王叔英為翰林修撰翌日又召解縉為翰林待詔趙諒為留守左衞指揮僉事詔逮燕府官屬而昺貴與都指揮使張信受密㫖擒王以長史誠及指揮盧振為内應信受命日以為憂其母疑而問之信以實對母曰不可吾聞而父嘗云王氣在燕果爾非汝所能擒也信聞之益憂不知所從未㡬復有勅趣之信艴然曰何太甚乎乃潛詣府告其故昺司吏李友直又竊昺密疏以獻文皇乃召姚廣孝等共謀防禦時昺貴已帥北平在城七衞軍士布列城中以柵斷燕府四門文皇曰我病不出雖塞可也已而軍士登城擐甲執兵飛矢入王城四面鼔譟文皇始懼計亦莫知所出秋七月壬申㑹遣逮官校中使至文皇盡縳官校置庭中召昺貴付所逮者昺貴不來復使逮官校中使以所就逮名往乃至衞士甚衆及門門者呵止之惟昺貴入文皇曳杖賜宴酒數行謂昺貴曰吾奉藩于兹未嘗干擾官民爾等何為離間遂擲杖起出其伏甲擒昺貴詢之乃知皆齊泰黄子澄所為也文皇即日上書自陳不報乃遵祖訓帥兵靖難以指揮張玉朱能丘福俱為都指揮僉事兵將出右布政使郭資按察使墨麟都指揮使李濬陳恭宛平知縣賀寅皆從之即命資等視事如故時都指揮俞􅖰聞靖難兵起守居庸馬宣守薊州宋忠守懐來宣與鎮撫曾濬以薊州兵攻北平不克俱死之薊州遂降甲戌靖難兵破居庸復破懐來都指揮彭聚孫泰戰死宋忠俞􅖰俱被執自是遵化密雲開平龍門守將皆歸附忠􅖰既敗死宣府震驚谷王橞奔京師丙戌永平指揮陳旭趙彛郭亮以城降戊子文皇復上書不報庚寅大寧總兵劉貞都督陳亨都指揮卜萬引大寧兵十萬出松亭關次沙河進攻遵化壬辰靖難兵援遵化貞等退保松亭關亨隂附燕忌萬不敢發文皇知之貽萬書盛譽萬極詆毁亨密付所獲大寧卒俾歸致且厚賚之同獲卒竊聞因守者請得偕行惟命亦無庸賞守請得遣不賞者恚至即發其事貞亨得卒書遂執萬下獄是時帝銳意文治日與方孝孺輩討論周官法度以為北兵不足憂黄子澄謂北兵素强且兼有營薊之旅不早圖恐河北遂失乃命長興侯耿炳文為征虜大將軍駙馬都尉李堅都督甯忠為左右副將軍安陸侯吳傑江隂侯吳髙都督盛庸潘忠楊松顧成徐凱李文陳暉平安各將偏師步騎號百萬數道並進期𢷬北平檄河南山東山西三省合給軍餉改建北平布政使司于真定以刑部尚書暴昭出掌司事徵雲南兵入京備征八月己酉炳文兵三十萬次真定都督徐凱兵十萬次河間時潘忠守鄚州楊松守雄縣相為聲援壬子靖難兵至􅃰州乃秣馬蓐食日晡渡白溝河夜半抵雄縣圍其城衆始覺乃登城大罵燕軍憤恨黎明破其城盡殺守陴士卒松與所部九千人俱戰而死文皇聞諸將恣殺乃諭之曰我之舉義所以安社稷保生民豈以多殺為尚爾等乖我所為是非求生而欲速死也諸將懼皆免冠謝文皇怒始釋是日文皇曰潘忠不虞城破必引衆來援先令譚淵帥兵千餘過月樣橋潛伏水中以茭草一束蒙其首路旁伏勇士數人望忠至即舉砲水中伏起據橋忠果趨橋不得淵帥衆腹背夾擊忠敗被執遂至鄚州盡奪戰馬輜重辛酉靖難兵次無極壬戌次真定炳文出城大戰敗績兩副將李堅甯忠及都督顧成都指揮劉燧皆被執堅道殂丙寅靖難兵還北平帝聞炳文敗績始有憂色謂子澄曰奈何子澄對曰勝敗兵家常事無足慮今我士馬精强兵甲堅利彼區區一隅豈能當天下之力增兵五十萬必奏捷矣帝曰孰堪將者子澄曰景隆可以當之前不用炳文而用景隆豈有此失於是遣景隆代炳文馳至軍中齊泰等慮遼王寧王通燕召二王入衞寧王不至詔削其護衞監察御史康郁上封事其略曰竊聞兵久不解屢削藩封臣以為過也何則以諸王言之親則太祖遺體貴則孝康手足尊則陛下諸父也罪雖可廢而祖之遺體不可殘親之手足不可去諸父之恩不可虧也且使二帝在天之靈見其子弟輒遭戮辱亦必不忍臣每念至此未嘗不流涕也此皆豎儒持偏見廢大公或病藩封太重日謀削奪以至于此方周岷二王以無故被執執法者文其罪遂使二王父子流離播遷唇亡齒寒人人自危二王既竄湘亦被焚而代齊又吿反矣彼為計者以為兵不舉則禍不免是非朝廷激變邪及燕舉兵迄今兩月我前後調兵不止五十餘萬而乃一矢無獲謂之國有謀臣可乎將有二心卒不用命以遺君父憂誰執其咎諺曰親者割之不斷踈者續之不堅陛下誠不察此必有噬臍之悔疏入不省九月戊辰江隂侯髙都督耿璿楊文帥遼東兵圍永平戊寅大將軍景隆與山東參政鐵鉉合兵趨河間靖難兵援永平壬辰髙等退保山海關冬十月戊戌靖難兵出劉家口壬寅襲破大寧都指揮朱鑑死之遼王植奔京師丁未寧王權及都指揮房寛指揮徐理陳亨陳文皆歸燕景隆聞靖難兵在大寧引兵攻北平築壘九門景隆攻麗正門㡬破城中婦女並乗城擲瓦石景隆少却軍于鄭村壩甲寅文皇盡得大寧之衆分為五軍以張玉將中軍鄭亨何夀副之朱能將左軍朱榮李濬副之李彬將右軍徐理孟善副之徐忠將前軍陳文吳遠副之房寛將後軍葉允中毛整副之辛酉靖難兵入松亭關十有一月庚午次白河是夜河氷忽合衆忻然而渡趨援北平辛未玉等與景隆戰于鄭村壩景隆敗績奔徳州玉等乘勝遂破紫荆關乙亥文皇再上書自陳不報十有二月燕間遼東守將江隂侯髙削爵安置廣東專命楊文守遼東庚申靖難兵攻廣昌守將湯勝以城降詔進景隆太子太師初景隆被命北伐也實子澄薦之及軍敗子澄匿不以聞帝一日問子澄比聞軍中不利果何如對曰我軍屢戰屢勝彼已退走徳州旦夕捷音當至矣越三日景隆以扼退燕兵聞故進秩且遣使賫賜貂裘文綺内醖等物復命魏國公輝祖都督瞿能帥師㑹景隆北伐御史大夫陳性善為監軍户部司務錢芹為行軍署都事是月省躬殿成遷肅王于蘭州以葉砥為翰林編修梁潛為陽春知縣胡儼為桐城知縣顔伯瑋為沛縣知縣袁義為都督僉事誅留守左衞指揮同知李申申燕府儀賓讓之父也洪武三十有三年即建文二年春正月丙寅靖難兵攻蔚州守將王忠李逺以城降湖廣參議楊砥上言臣聞帝堯之徳親九族和萬邦不宜加兵燕藩自剪其輔枝葉盡而本根撥矣帝怒砥褫其秩安置遼東置後湖祗候所二月封孟焯為夀昌王贊儀為靖江王辛丑靖難兵由居庸還北平壬寅以禮部尚書陳迪右侍郎黄觀知貢舉翰林學士董倫太常少卿髙巽志充考試官右拾遺朱逢吉吏部郎中徐旭及史官葉惠仲吳勤趙友士張秉彛為同考試官御史王度俞吉士為監試官甲子改都察院為御史府三月丙寅䇿禮部貢士吳溥等一百一十人以胡廣為第一王艮次之李貫又次之夏四月丙申景隆兵次徳州武定侯郭英與安陸侯傑次真定㑹兵六十萬號百萬并力北伐帝遣中官賜景隆璽書斧鉞景隆得璽書斧鉞益驕恣庚子靖難兵出北平壬寅次武清癸卯次固安癸丑渡白溝河遇平安伏兵擊破之己未景隆英傑俱㑹于白溝庚申瞿能父子與燕將房寛接戰英等分兵為兩翼擒斬數百人殺其將陳亨大軍矢石如雨射中文皇馬凡三被創而三易馬矢三服皆盡乃提劒左右擊劒鋒亦缺折退走登堤景隆疑有伏不敢進追髙煦見事急以騎兵數千趨文皇所㑹大風起景隆旗折軍亂文皇帥煦復馳入陣大戰燕軍斬俞通淵及瞿能父子縱火燔諸營景隆英傑俱奔潰委棄輜重無算景隆璽書斧鉞盡為燕軍所獲是役也殺溺死者二十萬人景隆單騎還徳州壬戌靖難兵圍徳州五月辛未景隆自徳州濳出奔濟南癸酉燕將張信入徳州奪軍餉百萬轉掠濟陽參政鐵鉉都督盛庸參贊髙巍自臨邑入濟南丁丑文皇遣都指揮陳旭守徳州己卯帥兵遂圍濟南攻之急鉉與庸巍日夜防禦乗間大挫之辛巳燕軍引水灌城濟南人大懼鉉曰無恐計且破之令登陴人皆哭呼曰旦夕且降盡輟守具出千人城外伏地請文皇大喜遂下令退兵受降鉉於是懸鐵版城上伏壯士闉堵中及文皇入下鐡版傷其馬首文皇棄馬取從馬以歸闉堵中伏發文皇擊退復合兵圍濟南是時齊泰黄子澄聞景隆等數敗濟南危急乃謀罷兵壬午命尚寶丞李得成使燕文皇諭得成曰吾嘗三上書陳達中懇皆不見答不復敢瀆爾歸報朝廷自古聽讒邪以殘骨肉鮮不覆敗我為藩王尚復何求而讒人交構發兵見屠是以不得已用兵自救猶日望有囘旋之恩夫明主之治天下不忘所尊不弛所親舉其大而略其細是以九族睦而天下平今欲轉禍為福如反掌耳誅姧讒以謝祖宗去新法以復舊制施恩宗親罷兵息民以保國家無窮之休若狃於權姧必剪支屬但恐支屬盡而國家亦危矣言訖流涕左右皆流涕得成還自濟南具言之帝怒下得成獄六月詔置諸藩賓輔以楚府儀賓馬注為孝陵衞指揮僉事秋七月平安等帥兵二十萬亟趨徳州奪燕餉守將陳旭懼遁歸北平八月戊申濟南圍解以鐵鉉為山東左布政司有功將士姜貴等五十四人陞賞有差帝以景隆屢戰屢北召還京師命左都督盛庸代總戎事仍以濟南功封庸厯城侯佩平燕將軍印鉉進兵部尚書參贊軍務及景隆入見赦不誅子澄諫不聽翌日御史大夫練子寧執景隆於朝班且泣且數請誅之亦不聽九月壬戌朔承天門成詔改為臯門又改午門為端門端門為應門前門為路門謹身殿為正心殿罷華盖文華武英文淵諸殿大學士是日尚書鄭沂乞老改孝孺為文學博士乙丑靖難兵還北平冬十月乙未兵部侍郎盧淵以罪罷清逺戍卒羅義上書乞敦親罷兵不報厯城侯庸帥衆次徳州安陸侯傑次真定徐凱次滄州相為掎角以困北平滄州城潰凱督士卒修築丙午靖難兵佯出攻遼東至通州循河而南戊午渡直沽軍士銜枚夜行厥明抵滄州城下凱等倉卒出禦不戰而潰凱及都督程暹都指揮趙滸胡原李英張傑皆被執時降燕者數萬人燕將譚淵夜坑殺降卒三千人凱等皆降十有一月壬申靖難兵次臨清甲戍次大名十有二月甲午次汶上庸鉉帥兵躡其後先鋒孫霖營滑口燕將朱榮劉江襲破霖營都指揮唐禮被執霖退走乙卯靖難兵次東昌庸軍背城而陣燕以騎兵擊左翼不應擊右翼亦不應文皇因深入庸麾伏起被圍數重左右翼夾攻文皇窘甚及暮朱能周長以胡騎奮擊文皇潰圍而出燕軍為火器所乘大敗殺燕將張玉丙辰復戰又敗燕步卒先走庸乗之殺傷萬計丁巳庸傳檄真定滄州諸將水陸掎角邀其歸路靖難兵由間道還北平是嵗以徐實為兵部侍郎劉季篪為刑部侍郎唐愚為翰林侍讀鄒瑾為大理寺丞詔舉優通文學之士革除逸史卷一
